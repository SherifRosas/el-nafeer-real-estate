<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lever Pioneer - Receipt Voucher (سند قبض) v261</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Kufi+Arabic:wght@400;700&display=swap');

        :root {
            --obsidian: #0f0f0f;
            --metallic-blue: #06B6D4;
            --silver: #4A5568;
            --border-color: #CBD5E0;
            --a5-width: 210mm;
            --a5-height: 148mm;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Noto Kufi Arabic', sans-serif;
            -webkit-print-color-adjust: exact;
        }

        .voucher-container {
            width: var(--a5-width);
            height: var(--a5-height);
            background: #fff;
            border: 2px solid var(--obsidian);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            padding: 0;
            print-color-adjust: exact;
        }

        .header {
            background: var(--obsidian);
            height: 35mm;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 10mm;
            color: #fff;
            position: relative;
            border-bottom: 2mm solid var(--metallic-blue);
        }

        /* LOGO ON TOP RIGHT - SYNCED TO MASTER ASSET */
        .header-logo { width: 30mm; height: 30mm; order: 3; display: flex; justify-content: flex-end; align-items: center; }
        .header-logo img { width: 95%; height: auto; filter: drop-shadow(0 0 10px rgba(6, 182, 212, 0.4)); }

        .header-center { text-align: center; order: 2; flex: 1; }
        .voucher-title {
            font-size: 24pt;
            font-weight: 700;
            border: 1px solid var(--metallic-blue);
            padding: 2mm 8mm;
            border-radius: 2mm;
            background: rgba(255, 255, 255, 0.05);
            margin-bottom: 1mm;
            display: inline-block;
        }

        /* COMPANY INFO ON TOP LEFT */
        .header-left { text-align: right; order: 1; min-width: 60mm; padding-top: 2mm; }
        .company-name { font-size: 13pt; font-weight: 700; color: var(--metallic-blue); }
        .tagline { font-size: 8pt; opacity: 0.8; color: #fff; }

        .body { flex: 1; padding: 8mm 10mm; position: relative; }
        .form-row { display: flex; align-items: center; margin-bottom: 4mm; gap: 4mm; }
        .field-label { font-weight: 700; font-size: 11pt; color: var(--obsidian); min-width: 30mm; }
        .field-input { flex: 1; border-bottom: 1px dotted var(--silver); padding-bottom: 1mm; font-size: 10pt; height: 8mm; }

        .amount-box { position: absolute; top: 8mm; left: 10mm; display: flex; gap: 2mm; }
        .box { border: 2px solid var(--obsidian); height: 12mm; display: flex; flex-direction: column; text-align: center; }
        .box-label { background: var(--obsidian); color: #fff; font-size: 8pt; padding: 0 2mm; }
        .box-val { height: 8mm; padding: 1mm; font-weight: 700; width: 15mm; }

        .footer { margin-top: auto; display: flex; justify-content: space-around; padding: 5mm 10mm 10mm; text-align: center; }
        .signature-line { width: 40mm; border-top: 1px solid var(--obsidian); padding-top: 2mm; font-size: 10pt; font-weight: 700; }

        @media print {
            body { background: none; }
            .voucher-container { border: 1px solid #000; box-shadow: none; margin: 0; }
            @page { size: A5 landscape; margin: 0; }
        }
    </style>
</head>
<body>

    <div class="voucher-container">
        <div class="header">
            <div class="header-logo">
                <!-- MASTER LOGO SYNC -->
                <img src="../../../clients/lever-pioneer/lever_minimalist_profile_v221_00_cleaned_1775081914737.png" alt="Lever Logo">
            </div>
            
            <div class="header-center">
                <div class="voucher-title">سند قبض</div>
                <div style="font-size: 8pt; color: rgba(255, 255, 255, 0.6);">س ت : ١٣٠١٢ | ب ض : ٢٧٦/٨٠٠/٤١٩</div>
            </div>

            <div class="header-left">
                <div class="company-name">شركة ليفر الرائدة للمصاعد</div>
                <div class="tagline">توريد – تركيب – صيانة</div>
            </div>
        </div>

        <div class="body">
            <div class="amount-box">
                <div class="box"><div class="box-label">جنيه</div><div class="box-val"></div></div>
                <div class="box"><div class="box-label">قرش</div><div class="box-val"></div></div>
            </div>

            <div class="form-row" style="justify-content: flex-end; margin-bottom: 8mm;">
                <div class="field-label" style="min-width: unset;">تحريراً في:</div>
                <div class="field-input" style="flex: none; width: 40mm;">٢٠٢ /    /</div>
            </div>

            <div class="form-row">
                <div class="field-label">استلمنا من المكرم:</div>
                <div class="field-input"></div>
            </div>

            <div class="form-row">
                <div class="field-label">مبلغ وقدره:</div>
                <div class="field-input"></div>
                <div class="field-label" style="min-width: unset; padding-right: 2mm;">فقط لا غير</div>
            </div>

            <div class="form-row">
                <div class="field-label" style="min-width: 15mm; border: 1px solid #000; padding: 1mm 2mm;">نقداً</div>
                <div class="field-label" style="min-width: 15mm; border: 1px solid #000; padding: 1mm 2mm;">شيك</div>
                <div class="field-label" style="min-width: unset;">مسحوب على بنك:</div>
                <div class="field-input" style="width: 40mm;"></div>
                <div class="field-label" style="min-width: unset;">بتاريخ:</div>
                <div class="field-input" style="width: 30mm;"></div>
            </div>

            <div class="form-row">
                <div class="field-label">وذلك مقابل:</div>
                <div class="field-input"></div>
            </div>
        </div>

        <div class="footer">
            <div class="signature-line">توقيع المستلم</div>
            <div class="signature-line">توقيع المحاسب</div>
        </div>
    </div>

</body>
</html>
