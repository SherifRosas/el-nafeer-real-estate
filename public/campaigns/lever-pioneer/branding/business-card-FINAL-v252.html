<!DOCTYPE html>
<html lang="ar" dir="rtl">
<!-- ARCHITECTURAL HYBRID: v252.0 - ABSOLUTE FINAL VERTICAL MASTERPIECE -->
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lever Pioneer - Billionaire business Card (FINAL v252)</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;700&family=Noto+Kufi+Arabic:wght@400;700&display=swap');

        :root {
            --obsidian: #080808;
            --metallic-blue: #06B6D4;
            --chrome-silver: linear-gradient(135deg, #f0f0f0 0%, #c0c0c0 50%, #e0e0e0 100%);
            --card-width: 50mm;
            --card-height: 90mm;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #111;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Noto Kufi Arabic', sans-serif;
            -webkit-print-color-adjust: exact;
        }

        /* 50x90mm VERTICAL BUSINESS CARD WITH BRUSHED OBSIDIAN DESIGN */
        .business-card {
            width: var(--card-width);
            height: var(--card-height);
            background: radial-gradient(circle at top, #1a1a1a 0%, var(--obsidian) 100%);
            border: 0.5mm solid rgba(6, 182, 212, 0.4);
            box-shadow: inset 0 0 15px rgba(6, 182, 212, 0.2), 0 10px 40px rgba(0, 0, 0, 0.8);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 8mm 4mm;
            color: #fff;
            text-align: center;
            print-color-adjust: exact;
        }

        /* GLOWING METALLIC EDGE SIGNALS */
        .business-card::before {
            content: '';
            position: absolute;
            left: 0; top: 0; bottom: 0; width: 0.8mm;
            background: var(--metallic-blue);
            box-shadow: 0 0 8px var(--metallic-blue);
        }

        /* 3D LOGO SECTION (TOP) */
        .logo-section {
            width: 38mm;
            height: 38mm;
            margin-bottom: 4mm;
            z-index: 2;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .logo-section img {
            width: 100%;
            height: auto;
            filter: drop-shadow(0 10px 20px rgba(0, 0, 0, 0.6));
        }

        /* CONTENT SECTION (MIDDLE) - CHROME FOIL 3D LOOK */
        .content-section {
            flex: 1;
            z-index: 2;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .chrome-text {
            background: var(--chrome-silver);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 700;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            display: inline-block;
        }

        .title-line-1 {
            font-size: 14.5pt;
            margin-bottom: 1mm;
        }

        .title-line-2 {
            font-size: 12.5pt;
            margin-bottom: 4mm;
        }

        .tagline {
            font-size: 8pt;
            color: var(--metallic-blue);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 4mm;
            font-weight: 700;
            opacity: 0.9;
        }

        .contact-row {
            font-family: 'Outfit', sans-serif;
            font-size: 7.5pt;
            display: flex;
            flex-direction: column;
            gap: 1.5mm;
            color: #ccc;
        }

        .contact-row span {
            color: var(--silver);
        }

        /* FUNCTIONAL QR (BOTTOM) */
        .qr-section {
            margin-top: auto;
            z-index: 2;
        }

        .qr-section img {
            width: 18mm;
            height: 18mm;
            background: rgba(255, 255, 255, 0.05);
            padding: 1.5mm;
            border-radius: 1.5mm;
            border: 1px solid rgba(6, 182, 212, 0.3);
        }

        .qr-label {
            font-family: 'Outfit', sans-serif;
            font-size: 5pt;
            color: var(--metallic-blue);
            margin-top: 2mm;
            letter-spacing: 2px;
            font-weight: 700;
        }

        /* PRINT MEDIA QUERY */
        @media print {
            body { background: none; }
            .business-card { 
                box-shadow: none; 
                margin: 0; 
                border: 0.5mm solid var(--metallic-blue);
                width: 50mm;
                height: 90mm;
            }
            @page { size: 50mm 90mm; margin: 0; }
        }
    </style>
</head>
<body>

    <div class="business-card">
        <!-- LOGO (TOP) - USING THE 3D MASTERPIECE ASSET -->
        <div class="logo-section">
            <img src="../lever_pioneer_v318_ultimate.png" alt="Lever Logo">
        </div>

        <!-- CONTENT (MIDDLE) - CHROME FOIL 3D LOOK -->
        <div class="content-section">
            <h1 class="title-line-1 chrome-text">شركة ليفر</h1>
            <h2 class="title-line-2 chrome-text">الرائدة للمصاعد</h2>
            <p class="tagline">توريد – تركيب – صيانة</p>
            
            <div class="contact-row">
                <div>CALL: <span>01070615372</span></div>
                <div>WHATSAPP: <span>01111171368</span></div>
            </div>
        </div>

        <!-- FUNCTIONAL QR (BOTTOM) -->
        <div class="qr-section">
            <img src="qr-code.png" alt="QR Code">
            <p class="qr-label">SCAN TO ASCENT</p>
        </div>
    </div>

</body>
</html>
