version: '3.8'

services:
  web:
    build: .
    restart: always
    ports:
      - "3000:3000"
    env_file:
      - .env.local

  caddy:
    image: caddy:2-alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - caddy_data:/data
    # REPLACE "alnafeer.pro" WITH YOUR ACTUAL CUSTOM DOMAIN BEFORE RUNNING
    command: caddy reverse-proxy --from https://alnafeer.pro --to http://web:3000

volumes:
  caddy_data:
